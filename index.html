<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYROX Asia Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-glob"></div>
    <div class="background-glob alt"></div>
    
    <div class="app-container">
        <header>
            <h1>HYROX <span>Asia Tracker</span></h1>
            <p>Analyze results from the 10 most recent Asian events.</p>
        </header>

        <section class="filters glass-panel">
            <div class="filter-group">
                <label for="location">Location</label>
                <select id="location">
                    <option value="All">All Locations</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="division">Division</label>
                <select id="division">
                    <option value="All">All Divisions</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="gender">Gender</label>
                <select id="gender">
                    <option value="All">All Genders</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="age">Age Group</label>
                <select id="age">
                    <option value="All">All Ages</option>
                </select>
            </div>
        </section>

        <section class="results glass-panel">
            <div class="results-header">
                <h2>Leaderboard</h2>
                <span id="result-count">0 athletes found</span>
            </div>
            
            <div class="table-container">
                <table id="rankings-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Athlete</th>
                            <th>Nat.</th>
                            <th>Event</th>
                            <th>Division</th>
                            <th>Age</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data rows injected by JS -->
                    </tbody>
                </table>
            </div>
            
            <div id="loading" class="loading-state">
                <div class="spinner"></div>
                <p>Loading records...</p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
