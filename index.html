<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYROX Asia Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <link rel="stylesheet" href="styles.css?v=2.1">
</head>
<body>
    <div class="background-glob"></div>
    <div class="background-glob alt"></div>
    
    <div class="app-container">
        <header>
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Hyrox_Logo.png" alt="HYROX Logo" class="hyrox-logo">
            <h1>HYROX <span>Asia Tracker</span></h1>
            <p>Analyze results from the 10 most recent Asian events.</p>
        </header>

        <section class="filters glass-panel">
            <div class="filter-group" style="grid-column: 1 / -1;">
                <label>Locations (Multiple Selection)</label>
                <div id="location-tags" class="tag-group">
                    <!-- Location tags injected by JS -->
                </div>
            </div>
            
            <div class="filter-group">
                <label for="division">Division</label>
                <select id="division">
                    <option value="All">All Divisions</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="gender">Gender</label>
                <select id="gender">
                    <option value="All">All Genders</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="age">Age Group</label>
                <select id="age">
                    <option value="All">All Ages</option>
                </select>
            </div>
            
            <div class="filter-group" style="grid-column: 1 / -1; margin-top: 0.5rem;">
                <label for="search-input">Search Athlete</label>
                <input type="text" id="search-input" placeholder="Search by name... (e.g. Kim)" class="search-box">
            </div>
        </section>

        <section class="results glass-panel">
            <div class="results-header">
                <h2>Leaderboard</h2>
                <span id="result-count">0 athletes found</span>
            </div>
            
            <div class="table-container">
                <table id="rankings-table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="select-all" disabled></th>
                            <th>Rank</th>
                            <th>Athlete</th>
                            <th>Nat.</th>
                            <th>Event</th>
                            <th>Division</th>
                            <th>Age</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data rows injected by JS -->
                    </tbody>
                </table>
            </div>
            
            <div id="loading" class="loading-state">
                <div class="spinner"></div>
                <p>Loading records...</p>
            </div>
        </section>
    </div>


    <footer>
        <img src="f45_jamsil_logo.png" alt="F45 Jamsil Logo" class="f45-logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/150x50/1e293b/ffffff?text=F45+JAMSIL';">
        <p class="footer-text">This app created by Q only for F45Jamsil members</p>
    </footer>

    <script src="app.js?v=2.1"></script>
</body>
</html>
